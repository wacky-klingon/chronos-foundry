# Deprecated runtime template.
#
# The incremental CLI expects a 3-file configuration contract loaded by filename stem:
# - train.yaml
# - parquet_loader_config.yaml
# - incremental_training_config.yaml
#
# Use the templates in this same directory:
# - train.yaml
# - parquet_loader_config.yaml
# - incremental_training_config.yaml
#
# Example:
# poetry run chronos-trainer \
#   --config /path/to/train.yaml \
#   --config /path/to/parquet_loader_config.yaml \
#   --config /path/to/incremental_training_config.yaml \
#   train-incremental \
#   --start-date YYYY-MM-DD \
#   --end-date YYYY-MM-DD \
#   --validation-start-date YYYY-MM-DD \
#   --validation-end-date YYYY-MM-DD
